name: Close external pull requests

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  close:
    # author_association is OWNER/MEMBER/COLLABORATOR for people with push
    # access; everyone else gets a polite comment and a closed PR. Dependabot
    # is exempt — its update PRs are configured in .github/dependabot.yml.
    if: ${{ !contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association) && github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const number = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: `Thanks for taking the time to open this! memex doesn't accept external pull requests — see [CONTRIBUTING.md](https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md). Bug reports and ideas are very welcome as issues.`,
            });
            await github.rest.pulls.update({ owner, repo, pull_number: number, state: 'closed' });
