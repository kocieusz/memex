version: "2"

linters:
  enable:
    - modernize
  settings:
    errcheck:
      # Best-effort calls whose errors carry no useful action: closing
      # read-only files, cleaning up temp dirs, printing to a buffer/stdout.
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (*compress/gzip.Reader).Close
        - os.Remove
        - os.RemoveAll
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - (net/http.ResponseWriter).Write
